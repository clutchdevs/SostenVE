# SostenVE — non-secret application configuration (versioned).
# Secrets live in .env (see .env.example). Loaded once by the config singleton
# in apps/api/src/config and validated with Zod. No module reads this file directly.

default: &default
  app:
    name: "SostenVE"
    locale: "es-VE"

  triage:
    orange_tags_threshold_for_escalation: 3 # interruption rule (3+ orange -> high risk)
    likert_critical_option: 1

  sla:
    high_risk_assignment_minutes: 10
    cron_check_interval_minutes: 2

  crisis_lines:
    routing:
      - name: "LAPSI"
        start_hour: 8
        end_hour: 26 # represents 2:00 AM next day, no overlap with start_hour
        phone: "+584242907338"
      - name: "Colegio de Psicólogos de Miranda"
        start_hour: 2
        end_hour: 8
        phone: "04127840112"
    backup_lines:
      - name: "VEN-911"
        phone: "911"

  clinical_records:
    tept_diagnosis_block_days: 30 # RF-4.3
    event_date: "2026-06-24" # earthquake date; reference for the RF-4.3 TEPT block

  consent:
    # Informed consent shown at psychologist registration (RF-2.1.1, Módulo 2).
    # PROVISIONAL text: the official bioethical wording comes from the FPV
    # (sección 8 del PRD). Bump `version` whenever `text` changes so the audit
    # trail records exactly which wording each volunteer accepted.
    psychologist:
      version: "v0.1.0-draft"
      updated_at: "2026-06-29"
      text: |
        BORRADOR — Texto provisional pendiente del consentimiento bioético oficial
        de la Federación de Psicólogos de Venezuela (sección 8 del PRD).

        Como profesional voluntario declaro que:
        1. Brindaré atención psicológica conforme al Código de Ética del psicólogo
           venezolano y al principio de no maleficencia.
        2. Mantendré la confidencialidad de la información sensible de cada
           solicitante, salvo las excepciones legales de protección a la vida.
        3. Actuaré dentro de mi área de competencia y derivaré los casos que
           excedan mi formación (p. ej. crisis psicótica aguda).
        4. Trataré los datos personales con el deber de cuidado que exige la
           plataforma y no los usaré para fines ajenos a la atención.

        Al marcar la casilla acepto este consentimiento informado de forma libre.

  fpv:
    verifier: "dummy" # dummy | http (http pending the real FPV API contract)
    circuit_breaker:
      failure_threshold: 3
      cooldown_seconds: 30

  email:
    # provider: log (no real send, just logs) | smtp (nodemailer). Default "log"
    # keeps tests/e2e offline. Switch to "smtp" to send via the SMTP server below;
    # in local dev point it at the Supabase Inbucket SMTP (enable smtp_port = 54325
    # in supabase/config.toml) and read the emails at http://localhost:54324.
    provider: "log"
    from: "Sostén <no-reply@sostenve.app>"
    login_url: "http://localhost:3000/login"
    coordinator_invite_url: "http://localhost:3000/registro-coordinador"
    smtp:
      host: "host.docker.internal" # API container -> host's Inbucket
      port: 54325
      username: "" # Inbucket needs no auth; SMTP_PASSWORD (env) used when set

  rbac:
    roles: ["requester", "psychologist", "coordinator", "admin"]

  security:
    cors:
      development_origins: ["http://localhost:3000"]
      production_origins: ["https://sostenve.app"] # placeholder, confirm final domain
    rate_limit:
      intake_requests_per_minute: 10
      login_attempts_before_lockout: 5
      login_lockout_minutes: 15
    jwt:
      access_token_ttl_minutes: 15
      refresh_token_ttl_days: 7
    session:
      idle_timeout_minutes: 15 # RF-2.7: expire a session after inactivity
      invitation_ttl_days: 7 # RF-2.6: coordinator invitation validity window

development:
  <<: *default
  app:
    name: "SostenVE (dev)"
    locale: "es-VE"

production:
  <<: *default
