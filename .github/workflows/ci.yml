name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail on high/critical vulnerabilities in PRODUCTION dependencies only.
      # Dev-only advisories (e.g. node-tar via the Supabase CLI) are tracked by
      # Dependabot and must not break the build.
      #
      # Runs through scripts/audit-prod.mjs rather than `npm audit` directly: an
      # unfixable advisory can be excused by name, with a reason and an expiry
      # date, instead of lowering the threshold for every dependency.
      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
